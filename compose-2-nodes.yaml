services:

  kobuki:
    image: crl/kobuki:humble
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ros2 launch kobuki kobuki.launch.py
    restart: unless-stopped
    networks:
      - ros_network
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///cyclonedds.xml
    volumes:
      - ./cyclonedds.xml:/cyclonedds.xml
    privileged: true
    devices:
      - /dev:/dev

  lidar_node:
    build:
      context: .
      dockerfile: lidar.Dockerfile
    networks:
      - ros_network
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///cyclonedds.xml
    volumes:
      - ./cyclonedds.xml:/cyclonedds.xml
    privileged: true
    devices:
      - /dev:/dev

networks:
 ros_network:
   driver: bridge