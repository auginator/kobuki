# This docker-compose file sets up three services: zenoh_router, kobuki, and lidar_node.
# The kobuki service runs the Kobuki robot base, while the lidar_node service runs
# the SLAMTEC LIDAR node. Both connect to a Zenoh router for ROS 2 middleware
# communication over a custom Docker network named ros_network.
services:
  zenoh_router:
    image: eclipse/zenoh:latest
    networks:
      - ros_network
    volumes:
      - ./zenoh_router_config.json5:/zenoh_router_config.json5
    command: ["--config", "/zenoh_router_config.json5"]
    restart: unless-stopped
  kobuki:
    image: crl/kobuki-bringup:humble
    build:
      context: .
      dockerfile: bringup.Dockerfile
    restart: unless-stopped
    shm_size: "512m"
    depends_on:
      - zenoh_router
    networks:
      - ros_network
    environment:
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp
      - ZENOH_SESSION_CONFIG_URI=/zenoh_config.json5
    volumes:
      - ./zenoh_config.json5:/zenoh_config.json5
      - /dev:/dev # Testing if this solves the issue wit kobuki base not being recognized.
    privileged: true
    # devices:
    #   - /dev/kobuki:/dev/kobuki

  lidar_node:
    build:
      context: .
      dockerfile: slam.Dockerfile
    shm_size: "512m"
    depends_on:
      - zenoh_router
    networks:
      - ros_network
    ports:
      - "8765:8765"
    environment:
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp
      - ZENOH_SESSION_CONFIG_URI=/zenoh_config.json5
    volumes:
      - ./zenoh_config.json5:/zenoh_config.json5
      - ./maps:/ros2_ws/maps
    privileged: true
    devices:
      - /dev/rplidar:/dev/rplidar
      - /dev/input/js0:/dev/input/js0
      - /dev/kobuki:/dev/kobuki
  orchestrator:
    build:
      context: .
      dockerfile: orchestrator.Dockerfile
    shm_size: "512m"
    depends_on:
      - zenoh_router
      - kobuki
    container_name: kobuki_orchestrator
    restart: unless-stopped
    networks:
      - ros_network
    devices:
      - /dev/input/js0:/dev/input/js0
    privileged: true
    environment:
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp
      - ZENOH_SESSION_CONFIG_URI=/zenoh_config.json5
      - ROS_DOMAIN_ID=0 # match your other containers
      - ROS_WS=/ros2_ws
      - MAPPING_LAUNCH_PKG=slam
      - MAPPING_LAUNCH_FILE=slam_mapping.launch.py
      - LOCALIZATION_LAUNCH_PKG=slam
      - LOCALIZATION_LAUNCH_FILE=slam_localization.launch.py
      - NAV2_LAUNCH_PKG=nav2_bringup
      - NAV2_LAUNCH_FILE=navigation_launch.py
      - NAV2_PARAMS_FILE=/ros2_ws/install/slam/share/slam/config/nav2_params.yaml
    volumes:
      - ./zenoh_config.json5:/zenoh_config.json5
      # Live-edit the orchestrator without rebuilding
      # - ./robot_orchestrator.py:/robot_orchestrator.py:ro
      # Shared maps directory — all containers see the same maps
      - ./maps:/ros2_ws/maps
    ports:
      - "8080:8080" # HTTP API — accessible from Mac browser / curl
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/status"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  ros_network:
    driver: bridge
